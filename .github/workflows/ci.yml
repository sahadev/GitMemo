name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo clippy -- -D warnings

  sync-website-assets:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install OSS SDK
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install oss2

      - name: Sync website assets to Aliyun OSS
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          WEBSITE_OSS_PREFIX: website/assets
        run: python3 scripts/sync_website_assets_to_oss.py

  check-version:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      version: ${{ steps.check.outputs.version || steps.version.outputs.version }}
      cli_version: ${{ steps.check.outputs.cli_version || steps.version.outputs.cli_version }}
      core_changed: ${{ steps.check.outputs.core_changed }}
      cli_changed: ${{ steps.check.outputs.cli_changed }}
      desktop_changed: ${{ steps.check.outputs.desktop_changed }}
      website_changed: ${{ steps.check.outputs.website_changed }}
      release_infra_changed: ${{ steps.check.outputs.release_infra_changed }}
      release_changed: ${{ steps.check.outputs.release_changed }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release versions
        id: version
        run: |
          DESKTOP_VERSION=$(python3 -c 'import json; print(json.load(open("desktop/package.json"))["version"])')
          CLI_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${DESKTOP_VERSION}" >> $GITHUB_OUTPUT
          echo "cli_version=v${CLI_VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag exists and auto-bump if needed
        id: check
        run: |
          TAG="${{ steps.version.outputs.version }}"
          CHANGE_OUTPUTS=release-changes.env

          detect_changes() {
            local base="${1:-}"
            if [ -n "$base" ]; then
              python3 scripts/detect_release_changes.py --base "$base" --head HEAD --summary > "$CHANGE_OUTPUTS"
            else
              python3 scripts/detect_release_changes.py --bootstrap --summary > "$CHANGE_OUTPUTS"
            fi
            cat "$CHANGE_OUTPUTS"
            # shellcheck disable=SC1090
            . "$CHANGE_OUTPUTS"
          }

          write_change_outputs() {
            cat "$CHANGE_OUTPUTS" >> "$GITHUB_OUTPUT"
          }

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            # Tag exists — check if there are new commits since the tag
            COMMITS_SINCE=$(git rev-list "$TAG"..HEAD --count)
            if [ "$COMMITS_SINCE" -gt 0 ]; then
              detect_changes "$TAG"
              write_change_outputs
              if [ "$release_changed" != "true" ]; then
                echo "Tag $TAG exists but no release-impacting changes were detected. Skipping release."
                echo "should_release=false" >> $GITHUB_OUTPUT
                exit 0
              fi

              echo "Tag $TAG exists but $COMMITS_SINCE new commits found. Auto-bumping version..."
              CURRENT=$(python3 -c 'import json; print(json.load(open("desktop/package.json"))["version"])')
              MAJOR=$(echo "$CURRENT" | cut -d. -f1)
              MINOR=$(echo "$CURRENT" | cut -d. -f2)
              PATCH=$(echo "$CURRENT" | cut -d. -f3)
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
              python3 scripts/sync_desktop_version.py "${NEW_VERSION}"
              NEW_CLI_VERSION="${{ steps.version.outputs.cli_version }}"
              if [ "$cli_changed" = "true" ]; then
                CLI_CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
                CLI_MAJOR=$(echo "$CLI_CURRENT" | cut -d. -f1)
                CLI_MINOR=$(echo "$CLI_CURRENT" | cut -d. -f2)
                CLI_PATCH=$(echo "$CLI_CURRENT" | cut -d. -f3)
                CLI_NEW_PATCH=$((CLI_PATCH + 1))
                CLI_NEW_VERSION="${CLI_MAJOR}.${CLI_MINOR}.${CLI_NEW_PATCH}"
                sed -i "s/^version = \"${CLI_CURRENT}\"/version = \"${CLI_NEW_VERSION}\"/" Cargo.toml
                NEW_CLI_VERSION="v${CLI_NEW_VERSION}"
              fi
              # Commit and push the version bump
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add Cargo.toml desktop/package.json desktop/src-tauri/Cargo.toml desktop/src-tauri/tauri.conf.json
              git commit -m "chore: auto-bump version to ${NEW_VERSION} [skip ci]"
              git push origin HEAD:main
              # Update output with new version
              echo "version=v${NEW_VERSION}" >> $GITHUB_OUTPUT
              echo "cli_version=${NEW_CLI_VERSION}" >> $GITHUB_OUTPUT
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "Tag $TAG exists and no new commits. Skipping release."
              python3 scripts/detect_release_changes.py --changed-file "" > "$CHANGE_OUTPUTS"
              write_change_outputs
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          else
            if git describe --tags --abbrev=0 >/dev/null 2>&1; then
              PREV_TAG=$(git describe --tags --abbrev=0)
              detect_changes "$PREV_TAG"
            else
              detect_changes
            fi
            write_change_outputs
            if [ "$release_changed" = "true" ]; then
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "No release-impacting changes detected. Skipping release."
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gitmemo-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gitmemo-macos-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Sync desktop version files
        run: python3 scripts/sync_desktop_version.py

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: cp target/${{ matrix.target }}/release/gitmemo ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-desktop:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            args: --target aarch64-apple-darwin
            artifact_suffix: macos-aarch64
          - os: macos-latest
            args: --target x86_64-apple-darwin
            artifact_suffix: macos-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.artifact_suffix }}

      - name: Sync desktop version files
        env:
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ vars.ALIYUN_OSS_PUBLIC_BASE_URL }}
        run: python3 scripts/sync_desktop_version.py

      - name: Generate changelog
        run: |
          git fetch --tags
          python3 scripts/generate_changelog.py

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          args: ${{ matrix.args }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gitmemo-desktop-${{ matrix.artifact_suffix }}
          path: |
            desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig

  dispatch-release:
    needs: [check-version, build, build-desktop]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ needs.check-version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ needs.check-version.outputs.version }} already exists"
          else
            git tag ${{ needs.check-version.outputs.version }}
            git push origin ${{ needs.check-version.outputs.version }}
          fi

      - name: Trigger sign-and-release
        run: |
          set -euo pipefail

          # The private signing workflow still uses client_payload.cli_changed as
          # its legacy "create the signed desktop release" gate. Keep the real
          # CLI change decision in actual_cli_changed for source-repo jobs.
          curl --fail-with-body \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 30 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RELEASE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ secrets.RELEASE_REPO }}/dispatches \
            -d '{
              "event_type": "sign-and-release",
              "client_payload": {
                "version": "${{ needs.check-version.outputs.version }}",
                "cli_changed": "${{ needs.check-version.outputs.release_changed }}",
                "actual_cli_changed": "${{ needs.check-version.outputs.cli_changed }}",
                "desktop_changed": "${{ needs.check-version.outputs.desktop_changed }}",
                "release_changed": "${{ needs.check-version.outputs.release_changed }}",
                "run_id": "${{ github.run_id }}",
                "repository": "${{ github.repository }}"
              }
            }'

  wait-signed-dmgs:
    needs: [check-version, dispatch-release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Download signed DMGs
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ needs.check-version.outputs.version }}
          SIGNED_DMG_WAIT_TIMEOUT_SECONDS: "3600"
          SIGNED_DMG_POLL_SECONDS: "30"
        run: |
          set -euo pipefail

          rm -rf release-assets
          mkdir -p release-assets

          list_release_assets() {
            gh release view "$VERSION_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets[].name' 2>/dev/null || true
          }

          has_required_signed_dmgs() {
            grep -Eq '^GitMemo_v?.+_aarch64\.dmg$' release-asset-names.txt &&
            grep -Eq '^GitMemo_v?.+_(x86_64|x64)\.dmg$' release-asset-names.txt
          }

          download_signed_dmgs() {
            while IFS= read -r name; do
              case "$name" in
                GitMemo_v*.dmg|GitMemo_*.dmg)
                  for attempt in 1 2 3; do
                    if gh release download "$VERSION_TAG" --repo "$GITHUB_REPOSITORY" --pattern "$name" --dir release-assets --clobber; then
                      break
                    fi

                    if [ "$attempt" -eq 3 ]; then
                      echo "Failed to download signed DMG after 3 attempts: $name" >&2
                      exit 1
                    fi

                    echo "Download failed for $name; retrying in 10s..."
                    sleep 10
                  done
                  ;;
              esac
            done < release-asset-names.txt
          }

          deadline=$((SECONDS + SIGNED_DMG_WAIT_TIMEOUT_SECONDS))
          previous_names="__uninitialized__"

          while [ "$SECONDS" -lt "$deadline" ]; do
            list_release_assets > release-asset-names.txt
            current_names="$(cat release-asset-names.txt)"

            if [ "$current_names" != "$previous_names" ]; then
              echo "Current release assets:"
              if [ -s release-asset-names.txt ]; then
                cat release-asset-names.txt
              else
                echo "(none yet)"
              fi
              previous_names="$current_names"
            fi

            if has_required_signed_dmgs; then
              download_signed_dmgs
              break
            fi

            remaining=$((deadline - SECONDS))
            if [ "$remaining" -le 0 ]; then
              break
            fi

            echo "Signed release DMGs not ready yet; retrying in ${SIGNED_DMG_POLL_SECONDS}s (${remaining}s remaining)..."
            sleep "$SIGNED_DMG_POLL_SECONDS"
          done

          if ! find release-assets -maxdepth 1 -type f -name 'GitMemo_*_aarch64.dmg' -print -quit | grep -q . ||
             ! find release-assets -maxdepth 1 -type f \( -name 'GitMemo_*_x86_64.dmg' -o -name 'GitMemo_*_x64.dmg' \) -print -quit | grep -q .; then
            echo "Timed out waiting for signed GitHub release DMGs for $VERSION_TAG" >&2
            echo "Release: https://github.com/$GITHUB_REPOSITORY/releases/tag/$VERSION_TAG" >&2
            echo "Last observed assets:" >&2
            cat release-asset-names.txt >&2 || true
            exit 1
          fi

          ls -lh release-assets

      - name: Upload signed DMGs artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-dmgs
          path: release-assets/*.dmg
          if-no-files-found: error
          retention-days: 1

  sync-oss:
    needs: [check-version, wait-signed-dmgs]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download signed DMGs
        uses: actions/download-artifact@v4
        with:
          name: signed-release-dmgs
          path: release-assets

      - name: Verify signed DMGs
        run: |
          ls -lh release-assets
          test -n "$(find release-assets -maxdepth 1 -type f -name 'GitMemo_*_aarch64.dmg' -print -quit)"
          test -n "$(find release-assets -maxdepth 1 -type f \( -name 'GitMemo_*_x86_64.dmg' -o -name 'GitMemo_*_x64.dmg' \) -print -quit)"

      - name: Download CLI artifacts
        if: needs.check-version.outputs.cli_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: gitmemo-macos-*
          path: release-assets
          merge-multiple: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Tauri CLI dependencies
        working-directory: desktop
        run: pnpm install

      - name: Repack updater archives from signed DMGs
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          repack_updater_archive() {
            local arch="$1"
            local dmg="$2"
            local archive="$PWD/release-assets/GitMemo-desktop-macos-${arch}.app.tar.gz"
            local mount_dir
            local app_dir
            mount_dir="$(mktemp -d)"
            app_dir="$(mktemp -d)"

            hdiutil attach "$dmg" -mountpoint "$mount_dir" -nobrowse -readonly
            ditto "$mount_dir/GitMemo.app" "$app_dir/GitMemo.app"
            hdiutil detach "$mount_dir"

            codesign -dv --verbose=4 "$app_dir/GitMemo.app" 2>&1 | grep -E 'Authority=|TeamIdentifier='
            spctl -a -vv -t exec "$app_dir/GitMemo.app"

            rm -f "$archive" "$archive.sig"
            tar -C "$app_dir" -czf "$archive" GitMemo.app
            pnpm --dir desktop exec tauri signer sign "$archive"
            test -s "$archive.sig"
          }

          aarch64_dmg="$(find release-assets -maxdepth 1 -type f -name 'GitMemo_*_aarch64.dmg' -print -quit)"
          x86_64_dmg="$(find release-assets -maxdepth 1 -type f \( -name 'GitMemo_*_x86_64.dmg' -o -name 'GitMemo_*_x64.dmg' \) -print -quit)"

          test -n "$aarch64_dmg"
          test -n "$x86_64_dmg"

          repack_updater_archive aarch64 "$aarch64_dmg"
          repack_updater_archive x86_64 "$x86_64_dmg"

          ls -lh release-assets

      - name: Generate updater manifest
        env:
          VERSION_TAG: ${{ needs.check-version.outputs.version }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/write_latest_json.py

      - name: Generate CLI update manifest
        env:
          CLI_VERSION_TAG: ${{ needs.check-version.outputs.version }}
          CLI_VERSION: ${{ needs.check-version.outputs.cli_version }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/write_cli_latest_json.py

      - name: Upload updater assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ needs.check-version.outputs.version }}
        run: |
          assets=(
            release-assets/GitMemo-desktop-macos-aarch64.app.tar.gz \
            release-assets/GitMemo-desktop-macos-aarch64.app.tar.gz.sig \
            release-assets/GitMemo-desktop-macos-x86_64.app.tar.gz \
            release-assets/GitMemo-desktop-macos-x86_64.app.tar.gz.sig \
            release-assets/latest.json
          )
          if [ "${{ needs.check-version.outputs.cli_changed }}" = "true" ]; then
            assets+=(
              release-assets/gitmemo-macos-aarch64
              release-assets/gitmemo-macos-x86_64
            )
          fi
          assets+=(release-assets/cli-latest.json)
          gh release upload "$VERSION_TAG" \
            "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Install OSS SDK
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install oss2

      - name: Sync release assets to Aliyun OSS
        env:
          VERSION_TAG: ${{ needs.check-version.outputs.version }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ vars.ALIYUN_OSS_PUBLIC_BASE_URL }}
          ALIYUN_OSS_PREFIX: releases
          ALIYUN_OSS_KEEP_RELEASES: "1"
        run: .venv/bin/python scripts/sync_release_assets_to_oss.py

name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo clippy -- -D warnings

  sync-website-assets:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install OSS SDK
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install oss2

      - name: Sync website assets to Aliyun OSS
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          WEBSITE_OSS_PREFIX: website/assets
        run: python3 scripts/sync_website_assets_to_oss.py

  check-version:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      version: ${{ steps.check.outputs.version || steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag exists and auto-bump if needed
        id: check
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            # Tag exists — check if there are new commits since the tag
            COMMITS_SINCE=$(git rev-list "$TAG"..HEAD --count)
            if [ "$COMMITS_SINCE" -gt 0 ]; then
              echo "Tag $TAG exists but $COMMITS_SINCE new commits found. Auto-bumping version..."
              # Bump patch version in Cargo.toml
              CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
              MAJOR=$(echo "$CURRENT" | cut -d. -f1)
              MINOR=$(echo "$CURRENT" | cut -d. -f2)
              PATCH=$(echo "$CURRENT" | cut -d. -f3)
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
              sed -i "s/^version = \"${CURRENT}\"/version = \"${NEW_VERSION}\"/" Cargo.toml
              python3 scripts/sync_desktop_version.py "${NEW_VERSION}"
              # Commit and push the version bump
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add Cargo.toml desktop/package.json desktop/src-tauri/Cargo.toml desktop/src-tauri/tauri.conf.json
              git commit -m "chore: auto-bump version to ${NEW_VERSION} [skip ci]"
              git push origin HEAD:main
              # Update output with new version
              echo "version=v${NEW_VERSION}" >> $GITHUB_OUTPUT
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "Tag $TAG exists and no new commits. Skipping release."
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gitmemo-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gitmemo-macos-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Sync desktop version files
        run: python3 scripts/sync_desktop_version.py

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: cp target/${{ matrix.target }}/release/gitmemo ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-desktop:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            args: --target aarch64-apple-darwin
            artifact_suffix: macos-aarch64
          - os: macos-latest
            args: --target x86_64-apple-darwin
            artifact_suffix: macos-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.artifact_suffix }}

      - name: Sync desktop version files
        env:
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ vars.ALIYUN_OSS_PUBLIC_BASE_URL }}
        run: python3 scripts/sync_desktop_version.py

      - name: Generate changelog
        run: |
          git fetch --tags
          python3 scripts/generate_changelog.py

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          args: ${{ matrix.args }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gitmemo-desktop-${{ matrix.artifact_suffix }}
          path: |
            desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig

  dispatch-release:
    needs: [check-version, build, build-desktop]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ needs.check-version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ needs.check-version.outputs.version }} already exists"
          else
            git tag ${{ needs.check-version.outputs.version }}
            git push origin ${{ needs.check-version.outputs.version }}
          fi

      - name: Trigger sign-and-release
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RELEASE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ secrets.RELEASE_REPO }}/dispatches \
            -d '{
              "event_type": "sign-and-release",
              "client_payload": {
                "version": "${{ needs.check-version.outputs.version }}",
                "run_id": "${{ github.run_id }}",
                "repository": "${{ github.repository }}"
              }
            }'

  sync-oss:
    needs: [check-version, dispatch-release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download signed DMGs
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ needs.check-version.outputs.version }}
        run: |
          rm -rf release-assets
          mkdir -p release-assets

          for attempt in $(seq 1 60); do
            names="$(gh release view "$VERSION_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || true)"
            echo "$names"

            if echo "$names" | grep -Eq '^GitMemo_v?.+_aarch64\.dmg$' &&
               echo "$names" | grep -Eq '^GitMemo_v?.+_(x86_64|x64)\.dmg$'; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Timed out waiting for signed GitHub release DMGs" >&2
              exit 1
            fi

            echo "Signed release DMGs not ready yet; retrying in 20s..."
            sleep 20
          done

          while IFS= read -r name; do
            case "$name" in
              GitMemo_v*.dmg|GitMemo_*.dmg)
                gh release download "$VERSION_TAG" --repo "$GITHUB_REPOSITORY" --pattern "$name" --dir release-assets --clobber
                ;;
            esac
          done <<< "$names"

          ls -lh release-assets
          test -n "$(find release-assets -maxdepth 1 -type f -name 'GitMemo_*_aarch64.dmg' -print -quit)"
          test -n "$(find release-assets -maxdepth 1 -type f \( -name 'GitMemo_*_x86_64.dmg' -o -name 'GitMemo_*_x64.dmg' \) -print -quit)"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Tauri CLI dependencies
        working-directory: desktop
        run: pnpm install

      - name: Repack updater archives from signed DMGs
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          repack_updater_archive() {
            local arch="$1"
            local dmg="$2"
            local archive="$PWD/release-assets/GitMemo-desktop-macos-${arch}.app.tar.gz"
            local mount_dir
            local app_dir
            mount_dir="$(mktemp -d)"
            app_dir="$(mktemp -d)"

            hdiutil attach "$dmg" -mountpoint "$mount_dir" -nobrowse -readonly
            ditto "$mount_dir/GitMemo.app" "$app_dir/GitMemo.app"
            hdiutil detach "$mount_dir"

            codesign -dv --verbose=4 "$app_dir/GitMemo.app" 2>&1 | grep -E 'Authority=|TeamIdentifier='
            spctl -a -vv -t exec "$app_dir/GitMemo.app"

            rm -f "$archive" "$archive.sig"
            tar -C "$app_dir" -czf "$archive" GitMemo.app
            pnpm --dir desktop exec tauri signer sign "$archive"
            test -s "$archive.sig"
          }

          aarch64_dmg="$(find release-assets -maxdepth 1 -type f -name 'GitMemo_*_aarch64.dmg' -print -quit)"
          x86_64_dmg="$(find release-assets -maxdepth 1 -type f \( -name 'GitMemo_*_x86_64.dmg' -o -name 'GitMemo_*_x64.dmg' \) -print -quit)"

          test -n "$aarch64_dmg"
          test -n "$x86_64_dmg"

          repack_updater_archive aarch64 "$aarch64_dmg"
          repack_updater_archive x86_64 "$x86_64_dmg"

          ls -lh release-assets

      - name: Generate updater manifest
        env:
          VERSION_TAG: ${{ needs.check-version.outputs.version }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/write_latest_json.py

      - name: Upload updater assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ needs.check-version.outputs.version }}
        run: |
          gh release upload "$VERSION_TAG" \
            release-assets/GitMemo-desktop-macos-aarch64.app.tar.gz \
            release-assets/GitMemo-desktop-macos-aarch64.app.tar.gz.sig \
            release-assets/GitMemo-desktop-macos-x86_64.app.tar.gz \
            release-assets/GitMemo-desktop-macos-x86_64.app.tar.gz.sig \
            release-assets/latest.json \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Install OSS SDK
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install oss2

      - name: Sync release assets to Aliyun OSS
        env:
          VERSION_TAG: ${{ needs.check-version.outputs.version }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ vars.ALIYUN_OSS_PUBLIC_BASE_URL }}
          ALIYUN_OSS_PREFIX: releases
          ALIYUN_OSS_KEEP_RELEASES: "1"
        run: .venv/bin/python scripts/sync_release_assets_to_oss.py

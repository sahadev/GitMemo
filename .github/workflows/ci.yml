name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo clippy -- -D warnings

  check-version:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      version: ${{ steps.check.outputs.version || steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag exists and auto-bump if needed
        id: check
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            # Tag exists — check if there are new commits since the tag
            COMMITS_SINCE=$(git rev-list "$TAG"..HEAD --count)
            if [ "$COMMITS_SINCE" -gt 0 ]; then
              echo "Tag $TAG exists but $COMMITS_SINCE new commits found. Auto-bumping version..."
              # Bump patch version in Cargo.toml
              CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
              MAJOR=$(echo "$CURRENT" | cut -d. -f1)
              MINOR=$(echo "$CURRENT" | cut -d. -f2)
              PATCH=$(echo "$CURRENT" | cut -d. -f3)
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
              sed -i "s/^version = \"${CURRENT}\"/version = \"${NEW_VERSION}\"/" Cargo.toml
              # Commit and push the version bump
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add Cargo.toml
              git commit -m "chore: auto-bump version to ${NEW_VERSION} [skip ci]"
              git push origin HEAD:main
              # Update output with new version
              echo "version=v${NEW_VERSION}" >> $GITHUB_OUTPUT
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "Tag $TAG exists and no new commits. Skipping release."
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gitmemo-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: gitmemo-linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gitmemo-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gitmemo-macos-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: cp target/${{ matrix.target }}/release/gitmemo ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-desktop:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            args: --target aarch64-apple-darwin
            artifact_suffix: macos-aarch64
          - os: macos-latest
            args: --target x86_64-apple-darwin
            artifact_suffix: macos-x86_64
          - os: ubuntu-latest
            args: ""
            artifact_suffix: linux-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.artifact_suffix }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: ${{ matrix.args }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gitmemo-desktop-${{ matrix.artifact_suffix }}
          path: |
            desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/**/release/bundle/deb/*.deb

  release:
    needs: [check-version, build, build-desktop]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.check-version.outputs.version }}
          git push origin ${{ needs.check-version.outputs.version }}

      - name: Collect desktop binaries
        run: |
          mkdir -p release-assets
          # CLI binaries
          cp artifacts/gitmemo-linux-x86_64/gitmemo-linux-x86_64 release-assets/ || true
          cp artifacts/gitmemo-linux-aarch64/gitmemo-linux-aarch64 release-assets/ || true
          cp artifacts/gitmemo-macos-aarch64/gitmemo-macos-aarch64 release-assets/ || true
          cp artifacts/gitmemo-macos-x86_64/gitmemo-macos-x86_64 release-assets/ || true
          # Desktop binaries (flatten nested paths)
          find artifacts/gitmemo-desktop-* -name "*.dmg" -exec cp {} release-assets/ \; || true
          find artifacts/gitmemo-desktop-* -name "*.app.tar.gz" -exec cp {} release-assets/ \; || true
          find artifacts/gitmemo-desktop-* -name "*.AppImage" -exec cp {} release-assets/ \; || true
          find artifacts/gitmemo-desktop-* -name "*.deb" -exec cp {} release-assets/ \; || true
          ls -la release-assets/

      - name: Create Release
        run: |
          gh release create ${{ needs.check-version.outputs.version }} \
            --generate-notes \
            release-assets/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

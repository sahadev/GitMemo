# GitMemo 国内站 — gitmemo.kakacut.cn
# 注意：如果后续有独立域名（如 gitmemo.cn），替换 server_name 和 SSL 配置即可

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name gitmemo.kakacut.cn;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name gitmemo.kakacut.cn;

    ssl_certificate     /etc/nginx/ssl/subdomains.pem;
    ssl_certificate_key /etc/nginx/ssl/subdomains.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/gitmemo;
    index index.html;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Android APK direct download.
    # Served from a persistent downloads mount so website rsync --delete cannot
    # prune APK files when only the static site is redeployed.
    location ~ ^/mobile/gitmemo-android-v[0-9][^/]*-arm64-v8a-release\.apk$ {
        root /usr/share/nginx/gitmemo-downloads;
        try_files $uri /mobile/gitmemo-android-arm64-v8a-release.apk =404;
        types {
            application/vnd.android.package-archive apk;
        }
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=3600";
    }

    location /mobile/ {
        root /usr/share/nginx/gitmemo-downloads;
        try_files $uri =404;
        types {
            application/vnd.android.package-archive apk;
        }
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=3600";
    }

    # Desktop installers are also served from the persistent downloads mount.
    location /desktop/windows/ {
        root /usr/share/nginx/gitmemo-downloads;
        try_files $uri =404;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=3600";
    }

    location = /llms.txt {
        try_files $uri =404;
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }

    location ^~ /docs/ {
        try_files $uri =404;
        types {
            text/markdown md;
            application/json json;
        }
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }

    # 静态资源长期缓存（Vite hash）
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 搜索引擎爬虫友好
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nAllow: /\nSitemap: https://gitmemo.kakacut.cn/sitemap.xml\n";
    }
}

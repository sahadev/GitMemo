<!DOCTYPE html>
<html lang="zh-CN" data-mobile="false" data-mobile-extra-top-safe-area="false">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <script>
      (() => {
        const isMobile = /android|iphone|ipad|ipod/i.test(navigator.userAgent);
        document.documentElement.setAttribute("data-mobile", isMobile ? "true" : "false");
        let extraTopSafeArea = false;
        try {
          extraTopSafeArea = localStorage.getItem("gitmemo-mobile-extra-top-safe-area") === "true";
        } catch (_) {}
        document.documentElement.setAttribute(
          "data-mobile-extra-top-safe-area",
          isMobile && extraTopSafeArea ? "true" : "false"
        );
      })();
    </script>
    <style>
      :root {
        background: #171a15;
        color: #e7eadf;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      html,
      body,
      #root {
        min-height: 100%;
        width: 100%;
      }

      body {
        background: #171a15;
        margin: 0;
      }

      .gm-boot-shell {
        align-items: center;
        background: #171a15;
        box-sizing: border-box;
        color: #e7eadf;
        display: flex;
        flex-direction: column;
        gap: 30px;
        height: 100vh;
        height: 100dvh;
        inset: 0;
        justify-content: center;
        min-height: 100vh;
        padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
        position: fixed;
        width: 100vw;
      }

      .gm-boot-title {
        color: #ecf4e8;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .gm-boot-loader {
        align-items: center;
        display: flex;
        gap: 14px;
        height: 36px;
        justify-content: center;
      }

      .gm-boot-dot {
        animation: gm-boot-dot-pulse 1.44s ease-in-out infinite;
        background: #a7c779;
        border-radius: 999px;
        height: 8px;
        opacity: 0.35;
        width: 8px;
      }

      .gm-boot-dot:nth-child(2) {
        animation-delay: 0.18s;
      }

      .gm-boot-dot:nth-child(3) {
        animation-delay: 0.36s;
      }

      .gm-boot-progress {
        background: #2d352d;
        border-radius: 999px;
        height: 6px;
        overflow: hidden;
        position: relative;
        width: 240px;
      }

      .gm-boot-progress::before {
        animation: gm-boot-progress-slide 1.45s ease-in-out infinite alternate;
        background: #a7c779;
        border-radius: inherit;
        content: "";
        height: 100%;
        left: 0;
        position: absolute;
        top: 0;
        width: 72px;
      }

      @keyframes gm-boot-dot-pulse {
        from {
          opacity: 0.35;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes gm-boot-progress-slide {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(168px);
        }
      }

      html[data-mobile="true"] .gm-boot-shell {
        gap: 0;
      }

      html[data-mobile="true"] .gm-boot-title,
      html[data-mobile="true"] .gm-boot-loader,
      html[data-mobile="true"] .gm-boot-progress {
        display: none;
      }
    </style>
    <title>GitMemo</title>
  </head>
  <body>
    <div id="root">
      <div class="gm-boot-shell" aria-label="GitMemo 正在启动">
        <div class="gm-boot-title">GitMemo 正在启动中</div>
        <div class="gm-boot-loader" aria-hidden="true">
          <span class="gm-boot-dot"></span>
          <span class="gm-boot-dot"></span>
          <span class="gm-boot-dot"></span>
        </div>
        <div class="gm-boot-progress" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
